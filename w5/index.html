<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>AQW Fan Page</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">AQW UNIVERSE</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#games">Games</a></li>
        <li class="nav-item"><a class="nav-link" href="#join">Join</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO (basic only for now) -->
<section class="text-center p-5 bg-dark text-white">
  <h1>AQW Fan Page</h1>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<section id="games" class="container my-5">
  <h2 class="text-center mb-4">Games</h2>

  <div class="row g-3">

    <div class="col-12 col-md-6">
      <div class="card p-3">
        <img src="imgs/aqw.jpg" class="img-fluid mb-2" alt="AQW">
        <h5>AQWorlds</h5>
        <p>Classic MMORPG with quests and classes.</p>
      </div>
    </div>

    <div class="col-12 col-md-6">
      <div class="card p-3">
        <img src="imgs/aqw-infinity.jpg" class="img-fluid mb-2" alt="Infinity">
        <h5>AQW Infinity</h5>
        <p>Modern upgraded version with smoother gameplay.</p>
      </div>
    </div>
     <!-- ALERT -->
    <div class="container">
        <div class="alert alert-warning text-center">
    AQW Infinity updates coming soon!
  </div>
</div>
    <section id="join" class="container my-5">
  <h2 class="text-center mb-4">Join Guild</h2>

  <form>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Class</label>
      <select class="form-control">
        <option>Warrior</option>
        <option>Mage</option>
        <option>Rogue</option>
        <option>Healer</option>
      </select>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox">
      <label class="form-check-label">Join Now!</label>
    </div>

    <button class="btn btn-primary">Submit</button>
    <button class="btn btn-outline-danger">Reset</button>
    <div class="text-center mb-4">
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#info">
    AQW Lore Info
  </button>
</div>
  </form>
</section>

  </div>
</section>
</body>
</html>
